  <canvas id="particles"></canvas>

  <script>
    (function(){
      var c = document.getElementById('particles');
      c.style.cssText = 'position:fixed;top:0;left:0;z-index:0;pointer-events:none;';
      var ctx = c.getContext('2d');
      var w, h, particles = [];
      function resize() {
        w = c.width = window.innerWidth;
        h = c.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);
      for (var i = 0; i < 60; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          r: Math.random() * 1.5 + 0.5,
          a: Math.random() * 0.5 + 0.2
        });
      }
      function getColors() {
        if (document.body.classList.contains('light')) {
          return { r: 34, g: 85, b: 204, alphaMul: 0.7 };
        }
        return { r: 0, g: 255, b: 255, alphaMul: 1 };
      }
      function draw() {
        var col = getColors();
        ctx.clearRect(0, 0, w, h);
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + col.r + ',' + col.g + ',' + col.b + ',' + (p.a * col.alphaMul) + ')';
          ctx.fill();
          for (var j = i + 1; j < particles.length; j++) {
            var p2 = particles[j];
            var dx = p.x - p2.x;
            var dy = p.y - p2.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = 'rgba(' + col.r + ',' + col.g + ',' + col.b + ',' + (0.12 * (1 - dist / 120) * col.alphaMul) + ')';
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>

  <script>
    (function() {
      var saved = localStorage.getItem('theme') || 'dark';
      document.body.className = saved;
      var btns = document.querySelectorAll('.theme-btn');
      btns.forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-theme') === saved);
        btn.addEventListener('click', function() {
          var theme = this.getAttribute('data-theme');
          document.body.className = theme;
          localStorage.setItem('theme', theme);
          btns.forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-theme') === theme); });
        });
      });
    })();
  </script>
