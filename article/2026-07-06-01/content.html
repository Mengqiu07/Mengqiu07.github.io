<p>标题：李羿嵘参加上海交通大学夏令营</p>
<p>日期：2026.07.06</p>
<p>今天（2026年7月6日），李羿嵘与上海市向明中学、上海市大同中学的其他学生前往上海市交通大学（闵行校区）参加了 为期五天的2026上海交通大学人工智能研究院走进人工智能暑期挑战营。</p>
<p>在此次学习交流过程中，李羿嵘将抓住这一次宝贵的与高校交流机会，努力提升自我。</p>
